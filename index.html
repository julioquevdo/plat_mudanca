<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plataforma de Mudança 🌱</title>
  <meta name="description" content="Seu espaço seguro para evoluir com leveza, sem cobranças ou punições visuais." />
  <meta name="theme-color" content="#0B0F17" />

  <!-- Preconnect para Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />
</head>
<body>
  <!-- Environment variables injected by local server -->
  <script src="/env.js"></script>

  <div id="app" class="unauthenticated">
    <!-- Navigation Sidebar -->
    <aside id="sidebar"></aside>

    <!-- Main Content Outlet -->
    <main id="main-content">
      <div id="router-outlet"></div>
    </main>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- Bootstrapping Layer 6 Router -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
